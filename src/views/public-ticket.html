<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track Ticket | SupCrud by Crudzaso</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f5f7fb; color: #1e2a3b; }
    .card { width: min(92vw, 640px); background: #fff; border: 1px solid #dde5ef; border-radius: 12px; padding: 24px; box-shadow: 0 10px 25px rgba(12, 33, 64, 0.08); }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p { margin: 0 0 14px; color: #5d6d84; font-size: 14px; line-height: 1.5; }
    label { display: block; margin-top: 12px; font-size: 13px; font-weight: 700; color: #394b63; }
    input { width: 100%; box-sizing: border-box; margin-top: 8px; padding: 11px 12px; border-radius: 8px; border: 1px solid #c8d3e1; font-size: 14px; }
    button { width: 100%; margin-top: 12px; padding: 11px 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; color: #fff; background: #4f46e5; cursor: pointer; }
    .note { margin-top: 14px; font-size: 12px; color: #5d6d84; background: #edf2ff; border: 1px solid #cfdbff; border-radius: 8px; padding: 10px; }
    .section { display: none; margin-top: 12px; }
    .section.active { display: block; }
    .result { margin-top: 14px; border: 1px solid #dde5ef; border-radius: 8px; padding: 12px; background: #fafcff; }
    .result pre { white-space: pre-wrap; word-break: break-word; margin: 0; font-size: 13px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Track your ticket</h1>
    <p>SupCrud by Crudzaso</p>

    <div id="step-request" class="section active">
      <label for="referenceCode">Reference code</label>
      <input id="referenceCode" type="text" placeholder="SC-XXXX-XXXX" autocomplete="off" />

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="off" />

      <button id="trackBtn" type="button">Request OTP</button>
    </div>

    <div id="step-verify" class="section">
      <label for="otpCode">OTP code</label>
      <input id="otpCode" type="text" placeholder="6-digit OTP" autocomplete="off" />

      <button id="verifyBtn" type="button">Verify OTP</button>
      <button id="loadFullBtn" type="button" style="background:#0f766e;">Load Full Ticket</button>
    </div>

    <div id="step-result" class="section">
      <div id="ticketResult" class="result"></div>
    </div>

    <div class="note" id="note">Enter reference code and email to receive an OTP.</div>
  </main>

  <script>
    const API_URL = window.location.origin;
    const state = { referenceCode: '', email: '', accessToken: null, ticket: null };

    function setNote(message, isError = false) {
      const note = document.getElementById('note');
      note.textContent = message;
      note.style.background = isError ? '#fee2e2' : '#edf2ff';
      note.style.borderColor = isError ? '#fecaca' : '#cfdbff';
    }

    function showStep(step) {
      document.getElementById('step-request').classList.toggle('active', step === 'request');
      document.getElementById('step-verify').classList.toggle('active', step === 'verify');
      document.getElementById('step-result').classList.toggle('active', step === 'result');
    }

    function renderTicket(ticket) {
      document.getElementById('ticketResult').innerHTML = `
        <pre>${JSON.stringify(ticket, null, 2)}</pre>
      `;
    }

    async function requestOtp() {
      const referenceCode = document.getElementById('referenceCode').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!referenceCode || !email) {
        setNote('Reference code and email are required.', true);
        return;
      }

      setNote('Sending OTP...');
      try {
        const res = await fetch(`${API_URL}/api/public/request-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ referenceCode, email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Request failed');

        state.referenceCode = referenceCode;
        state.email = email;
        setNote('OTP sent! Check your email and enter the code.');
        showStep('verify');
      } catch (err) {
        setNote(err.message || 'Failed to send OTP', true);
      }
    }

    async function verifyOtp() {
      const code = document.getElementById('otpCode').value.trim();
      if (!code) {
        setNote('Please enter OTP code.', true);
        return;
      }

      setNote('Verifying OTP...');
      try {
        const res = await fetch(`${API_URL}/api/public/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ referenceCode: state.referenceCode, code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Verification failed');

        state.accessToken = data.accessToken;
        state.ticket = data.ticket;
        renderTicket(state.ticket);
        showStep('result');
        setNote('OTP verified. Basic ticket data loaded.');
      } catch (err) {
        setNote(err.message || 'OTP verification failed', true);
      }
    }

    async function loadFullTicket() {
      if (!state.accessToken || !state.referenceCode) {
        setNote('Verify OTP first.', true);
        return;
      }

      setNote('Loading full ticket...');
      try {
        const res = await fetch(`${API_URL}/api/public/ticket/${state.referenceCode}/full`, {
          headers: { 'x-public-token': state.accessToken }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Failed to load full ticket');

        state.ticket = data;
        renderTicket(state.ticket);
        showStep('result');
        setNote('Full ticket loaded.');
      } catch (err) {
        setNote(err.message || 'Failed to load full ticket', true);
      }
    }

    document.getElementById('trackBtn').addEventListener('click', requestOtp);
    document.getElementById('verifyBtn').addEventListener('click', verifyOtp);
    document.getElementById('loadFullBtn').addEventListener('click', loadFullTicket);
  </script>
</body>
</html>
